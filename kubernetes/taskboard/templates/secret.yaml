# WARNING: Do not commit real secrets to Git.
# In production replace with External Secrets Operator (AWS Secrets Manager) or Sealed Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: taskboard-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "taskboard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
data:
  # "taskboard" base64-encoded — replace with a strong password before deploying
  POSTGRES_PASSWORD: dGFza2JvYXJk
